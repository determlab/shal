name: "Feature / task (agent-ready)"
description: "A scoped piece of work an agent or a human can pick up. Fill every field. No DoD, no start."
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Keep it **scoped**. One outcome per issue. The agent-loop only runs on
        issues with a clear goal + testable acceptance criteria. Vague or huge?
        Split it first. **No DoD, no start** — this template IS the DoD
        (determlab dod-standard v1.0). When it's ready, a maintainer adds the
        `agent:go` label.
  - type: dropdown
    id: task_type
    attributes:
      label: Type
      description: Picks the rubric — each type has a different real consumer.
      options:
        - "feature — consumer: cold user on a clean machine reaches first value"
        - "bugfix — consumer: failing repro first, then a regression test"
        - "marketing — consumer: live + tracked metric (not 'drafted')"
        - "research — consumer: decision-ready recommendation, cited"
        - "ops/process — consumer: live AND enforced/verifiable"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why / milestone
      description: Which milestone or number this serves + what's true for the consumer when it's done.
      placeholder: "Serves v0.3.0 adoption. A cold installer hitting a bad topology gets a friendly pointer, not a traceback."
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: One or two sentences — what should be true when this is done, and why.
      placeholder: "Users can export a report as CSV, so they can open it in Excel."
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria (binary rubric)
      description: "Testable pass/fail checkboxes. Features: a cold user on a clean machine reaches first value; unhappy paths give friendly messages, not tracebacks. The reviewer checks the diff against these, one by one."
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How each criterion is checked (fresh env / command / agent run) and what evidence gets linked.
      placeholder: "Clean venv: pip install -e . && shal probe → screenshot/paste output. pytest tests/test_x.py passes."
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Don't-touch areas, perf/compat limits, conventions to follow.
      placeholder: "Keep it Python 3.10-compatible."
    validations:
      required: false
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of scope
      description: Explicitly what NOT to do. If the work grows >20% beyond this scope — stop and re-plan, don't push through.
      placeholder: "No UI changes. No new dependencies."
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Context / starting points
      description: Files, functions, links, prior art the implementer should start from.
      placeholder: "See src/export/, the existing JSON exporter is the closest pattern."
    validations:
      required: false
  - type: textarea
    id: docs_to_update
    attributes:
      label: Docs to update ("Merged" ≠ done)
      description: The docs this change touches — refreshed before the issue closes; superseded docs archived per the file taxonomy.
      value: |
        - [ ] project hub / status refreshed
        - [ ] superseded docs moved to archive/ (if any)
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ---
        **Hard-stops:** genuinely risky changes stop the agent-loop and flag a
        human: gate/approval code paths, new runtime dependencies,
        schema/data migrations, deletions of files the branch didn't create,
        anything touching secrets. In-rubric public-API edits are allowed
        pre-1.0 (0.x semver) — the reviewer verifies a changelog note.
