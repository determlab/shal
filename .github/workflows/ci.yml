name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: python -m pytest --cov=shal --cov-report=term-missing

  examples:
    # Keep examples/ alive: a src/shal change that breaks a demo or the
    # generation benchmark fails CI here instead of rotting silently.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Driver-creator benchmark (4 cases, generated drivers vs harness)
        run: python examples/driver-creator/run_benchmark.py
      - name: Registry manifests in sync with drivers (re-emit -> no diff)
        run: |
          python examples/driver-creator/emit_manifest.py
          git diff --exit-code -- 'examples/**/device.yaml' 'examples/**/metadata.yaml'
      - name: Demos run headless
        run: |
          python examples/demos/sonos/demo_sim.py
          python examples/demos/deebot/demo_sim.py
          python examples/demos/mesh/demo_mesh.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: sdist excludes examples/, tests/ and dev/ (the test approver must never ship, #78)
        run: |
          tar tzf dist/*.tar.gz | grep -E '/(examples|tests|dev)/' && exit 1 || echo "clean"
      - name: Wheel smoke — install the built wheel clean and run the CLI
        run: |
          python -m venv /tmp/ws
          /tmp/ws/bin/pip install "$(ls dist/*.whl)"
          /tmp/ws/bin/shal --help
          /tmp/ws/bin/shal docs | head -1
          /tmp/ws/bin/shal-mcp --help > /dev/null
          # the in-package agent guide must ship (the self-sufficiency promise, #55)
          /tmp/ws/bin/python -c "from importlib.resources import files; assert (files('shal')/'AGENT_GUIDE.md').is_file(), 'AGENT_GUIDE.md missing from the wheel'"
      - name: agenticQA release-acceptance — cold-install the sdist + drive the gate (sim, #78)
        run: python dev/eval/agenticqa/run.py --all --from-tarball "$(ls dist/*.tar.gz)"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
